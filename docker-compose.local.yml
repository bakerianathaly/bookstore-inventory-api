services:
    server-bookstore-inventory:
        build:
            context: .
            dockerfile: Docker/local/Dockerfile
        ports:
            - "8020:8020"
        volumes:
            - ./app:/app/app
            - ./alembic:/app/alembic
            - ./alembic.ini:/app/alembic.ini
            - ./.env:/app/.env
        env_file:
            - .env
        restart: unless-stopped
        depends_on:
            - db
        dns:
            - 8.8.8.8
            - 8.8.4.4
        healthcheck:
            test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8020/')"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
        networks:
            - testing-net

    db:
        image: postgres:13-alpine
        container_name: postgres_db
        restart: always
        env_file:
            - .env
        environment:
            POSTGRES_USER: ${MY_CUSTOM_USER}
            POSTGRES_PASSWORD: ${MY_CUSTOM_PASS}
            POSTGRES_DB: ${MY_CUSTOM_DB}
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - testing-net
volumes:
    postgres_data:
networks:
    testing-net:
        driver: bridge
